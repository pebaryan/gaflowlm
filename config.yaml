# Build and Training Configuration

# This file tracks configuration for the project, not model configs
# Model configs are in configs/ (to be created during Phase 1)

project:
  name: gaflowlm
  baseline_repo: https://github.com/jdeschena/s-flm
  baseline_commit: 18d586f  # Initial commit (May 14, 2026)

phase: 3  # 0=research, 1=rhf-implementation, 2=cfs-implementation, 3=evaluation
          # RHF + CFS + CARE + CFA + GWS landed; ablations in progress (see experiments/).

dependencies:
  pytorch: ">=2.7.0"
  lightning: ">=2.5.1"
  hydra_core: ">=1.3.2"
  einops: ">=0.8.1"

clifford_engine:
  default_k: 8  # Cl(8,0,0) = 256-dim multivector
  cayley_precompute: true
  sparse_grades: [0, 1, 2]  # For CFS variant; RHF uses only grade 1
  torch_compile: true

hardware:
  gpu: A100 80GB
  expected_steps_per_sec:
    sflm_baseline: 4.2
    rhf_estimate: 3.5-4.0  # Rotor overhead ~5-15%
    cfs_estimate: 2.0-3.0  # CFA + geometric products ~25-50%